name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Crear carpeta publica
        run: |
          mkdir public
          cp -r src/main/resources/templates/* public/
          cp -r src/main/resources/static/* public/

      - name: Subir archivos para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publicar sitio
        id: deployment
        uses: actions/deploy-pages@v4
